<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="left">
        <div class="logo">
            <img src="Img/odin-lined.png" alt="Green tropical leaves as background">
            <span>ODIN</span>
        </div>
        <div>
            <span class="credit">Photo by <a
                    href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie
                    West</a> on <a
                    href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a></span>
        </div>
    </div>
    <div class="right">
        <div class="text">
            <p>This is not a real online service! You know you need something like this in your life to help you
                realiza your deepest dreams. <br>Sign up <span class="italic">now</span> to get started.</p>
        </div>
        <div class="secondText">
            <p>You <span class="italic">know</span> you want to.</p>
        </div>
        <form id="sing-up-form">
            <h1>Let's do this!</h1>
            <div class="formRow">
                <div class="formCell">
                    <label for="first-name">FIRST NAME</label>
                    <input placeholder="John" type="text" name="first-name" id="first-name">
                </div>
                <div class="formCell">
                    <label for="last-name">LAST NAME</label>
                    <input placeholder="Smith" type="text" name="last-name" id="last-name">
                </div>
            </div>

            <div class="formRow">
                <div class="formCell">
                    <label for="email">EMAIL</label>
                    <input placeholder="example@example.com" type="email" name="email" id="email">
                </div>
                <div class="formCell">
                    <label for="phone-number">PHONE NUMBER</label>
                    <input type="text" name="phone-number" id="phone-number">
                </div>
            </div>

            <div class="formRow">
                <div class="formCell">
                    <label for="password">PASSWORD *</label>
                    <input required placeholder="*********" type="text" name="password" id="password">
                </div>
                <div class="formCell">
                    <label for="confirm-password">CONFIRM PASSWORD *</label>
                    <input required placeholder="*********" type="text" name="confirm-password" id="confirm-password">
                </div>
            </div>
        </form>
        <div class="acction">
            <button form="sing-up-form" type="submit">Create Account</button>
            <span>Already have an account? <a class="log-in-a" href="#">Log in</a></span>
        </div>
    </div>
</body>

</html>
